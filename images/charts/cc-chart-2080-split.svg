<svg viewBox="0 0 720 372" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two stacked bars comparing the share of credit unions by asset size with their share of gross lending.">
  <title>Most credit unions are small — the big ones do the lending</title>
  <desc>By asset size: credit unions under 5 million pounds are 15 percent of the sector but 2 percent of lending. The 5 to 10 million band is 34 percent of the sector and 5 percent of lending. The 10 to 30 million band is 27 percent and 12 percent. The over 30 million band is 21 percent and 48 percent. The largest, MCB-Castle, is 3 percent of the sector and 34 percent of lending. About 76 percent of credit unions hold under 30 million pounds, yet the larger quarter writes 81 percent of the lending.</desc>
  <rect x="1" y="1" width="718" height="370" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="32" y="44" font-size="20" font-weight="700" fill="#003566">Most credit unions are small — the big ones do the lending</text>
    <text x="32" y="66" font-size="13" fill="#64748b">Share of credit unions vs share of gross lending, by asset size</text>

    <text x="70" y="98" font-size="12.5" font-weight="600" fill="#1f3a56">Share of credit unions</text>
    <rect x="70" y="104" width="92.7" height="46" fill="#dbe7f1"/>
    <rect x="162.7" y="104" width="210.12" height="46" fill="#aac6e0"/>
    <rect x="372.82" y="104" width="166.86" height="46" fill="#6f9ec9"/>
    <rect x="539.68" y="104" width="129.78" height="46" fill="#2e6da4"/>
    <rect x="669.46" y="104" width="18.54" height="46" fill="#003566"/>
    <text x="116.35" y="131" font-size="12.5" fill="#003566" text-anchor="middle" font-weight="700">15%</text>
    <text x="267.76" y="131" font-size="12.5" fill="#003566" text-anchor="middle" font-weight="700">34%</text>
    <text x="456.25" y="131" font-size="12.5" fill="#ffffff" text-anchor="middle" font-weight="700">27%</text>
    <text x="604.57" y="131" font-size="12.5" fill="#ffffff" text-anchor="middle" font-weight="700">21%</text>

    <text x="70" y="178" font-size="12.5" font-weight="600" fill="#1f3a56">Share of gross lending</text>
    <rect x="70" y="184" width="12.24" height="46" fill="#dbe7f1"/>
    <rect x="82.24" y="184" width="30.59" height="46" fill="#aac6e0"/>
    <rect x="112.83" y="184" width="73.42" height="46" fill="#6f9ec9"/>
    <rect x="186.25" y="184" width="293.69" height="46" fill="#2e6da4"/>
    <rect x="479.94" y="184" width="208.04" height="46" fill="#003566"/>
    <text x="149.54" y="211" font-size="12.5" fill="#ffffff" text-anchor="middle" font-weight="700">12%</text>
    <text x="333.1" y="211" font-size="12.5" fill="#ffffff" text-anchor="middle" font-weight="700">48%</text>
    <text x="583.96" y="211" font-size="12.5" fill="#ffffff" text-anchor="middle" font-weight="700">34%</text>

    <rect x="32" y="252" width="656" height="44" rx="6" fill="#fff7cc"/>
    <rect x="32" y="252" width="4" height="44" fill="#FFD600"/>
    <text x="50" y="279" font-size="12.5" fill="#1f3a56">About <tspan font-weight="700" fill="#003566">76% of credit unions hold under £30m</tspan> in assets — yet the larger quarter writes <tspan font-weight="700" fill="#003566">81% of the lending</tspan>.</text>

    <g font-size="11.5" fill="#475569">
      <rect x="70" y="320" width="11" height="11" rx="2" fill="#dbe7f1"/>
      <text x="86" y="329.5">Below £5m</text>
      <rect x="190" y="320" width="11" height="11" rx="2" fill="#aac6e0"/>
      <text x="206" y="329.5">£5–10m</text>
      <rect x="298" y="320" width="11" height="11" rx="2" fill="#6f9ec9"/>
      <text x="314" y="329.5">£10–30m</text>
      <rect x="412" y="320" width="11" height="11" rx="2" fill="#2e6da4"/>
      <text x="428" y="329.5">Over £30m</text>
      <rect x="528" y="320" width="11" height="11" rx="2" fill="#003566"/>
      <text x="544" y="329.5">MCB-Castle</text>
    </g>

    <text x="32" y="360" font-size="10.5" fill="#94a3b8">Source: Fair4All Finance Credit Union Transformation Roadshow delegate pack, 2026</text>
  </g>
</svg>
