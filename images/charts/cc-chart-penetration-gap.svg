<svg viewBox="0 0 720 382" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bar chart of the percentage of adults who are credit union members by UK nation, 2014 versus 2024.">
  <title>High impact, low penetration</title>
  <desc>Percentage of adults aged 18 plus who are credit union members. England 1.52 percent in 2014 and 2.01 percent in 2024. Scotland 7.31 then 9.69. Wales 2.42 then 2.65. Northern Ireland 35.69 then 43.48. England, Scotland and Wales have barely grown their share over a decade while Northern Ireland sits far ahead.</desc>
  <rect x="1" y="1" width="718" height="380" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="32" y="44" font-size="20" font-weight="700" fill="#003566">High impact, low penetration</text>
    <text x="32" y="66" font-size="13" fill="#64748b">Adults aged 18+ who are credit union members, by nation (%)</text>

    <rect x="486" y="34" width="11" height="11" rx="2" fill="#94a3b8"/>
    <text x="503" y="43" font-size="12" fill="#475569">2014</text>
    <rect x="552" y="34" width="11" height="11" rx="2" fill="#003566"/>
    <text x="569" y="43" font-size="12" fill="#475569">2024</text>

    <line x1="70" y1="100" x2="70" y2="326" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="70" y1="326" x2="688" y2="326" stroke="#cbd5e1" stroke-width="1"/>

    <g fill="#94a3b8" font-size="11" text-anchor="end">
      <text x="58" y="330">0</text>
      <text x="58" y="284.8">10</text>
      <text x="58" y="239.6">20</text>
      <text x="58" y="194.4">30</text>
      <text x="58" y="149.2">40</text>
      <text x="58" y="104">50</text>
    </g>
    <g stroke="#eef2f6" stroke-width="1">
      <line x1="70" y1="280.8" x2="688" y2="280.8"/>
      <line x1="70" y1="235.6" x2="688" y2="235.6"/>
      <line x1="70" y1="190.4" x2="688" y2="190.4"/>
      <line x1="70" y1="145.2" x2="688" y2="145.2"/>
      <line x1="70" y1="100" x2="688" y2="100"/>
    </g>

    <rect x="109.3" y="319.1" width="34" height="6.9" fill="#94a3b8"/>
    <rect x="151.3" y="316.9" width="34" height="9.1" fill="#003566"/>
    <text x="126.3" y="312" font-size="10.5" fill="#64748b" text-anchor="middle">1.52</text>
    <text x="168.3" y="309" font-size="10.5" fill="#003566" text-anchor="middle" font-weight="700">2.01</text>
    <text x="147.3" y="344" font-size="12.5" fill="#1f3a56" text-anchor="middle" font-weight="600">England</text>

    <rect x="263.8" y="293.0" width="34" height="33.0" fill="#94a3b8"/>
    <rect x="305.8" y="282.2" width="34" height="43.8" fill="#003566"/>
    <text x="280.8" y="286" font-size="10.5" fill="#64748b" text-anchor="middle">7.31</text>
    <text x="322.8" y="275" font-size="10.5" fill="#003566" text-anchor="middle" font-weight="700">9.69</text>
    <text x="301.8" y="344" font-size="12.5" fill="#1f3a56" text-anchor="middle" font-weight="600">Scotland</text>

    <rect x="418.3" y="315.1" width="34" height="10.9" fill="#94a3b8"/>
    <rect x="460.3" y="314.0" width="34" height="12.0" fill="#003566"/>
    <text x="435.3" y="308" font-size="10.5" fill="#64748b" text-anchor="middle">2.42</text>
    <text x="477.3" y="307" font-size="10.5" fill="#003566" text-anchor="middle" font-weight="700">2.65</text>
    <text x="456.3" y="344" font-size="12.5" fill="#1f3a56" text-anchor="middle" font-weight="600">Wales</text>

    <rect x="572.8" y="164.7" width="34" height="161.3" fill="#94a3b8"/>
    <rect x="614.8" y="129.5" width="34" height="196.5" fill="#003566"/>
    <text x="589.8" y="158" font-size="10.5" fill="#64748b" text-anchor="middle">35.69</text>
    <text x="631.8" y="123" font-size="10.5" fill="#003566" text-anchor="middle" font-weight="700">43.48</text>
    <text x="610.8" y="344" font-size="12.5" fill="#1f3a56" text-anchor="middle" font-weight="600">N. Ireland</text>

    <text x="32" y="370" font-size="10.5" fill="#94a3b8">Source: Fair4All Finance Credit Union Transformation Roadshow delegate pack, 2024 figures</text>
  </g>
</svg>
