<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <rect width="200" height="220" fill="white"/>
  <!-- Globe outline -->
  <circle cx="100" cy="95" r="78" fill="none" stroke="#1A5276" stroke-width="5"/>
  <!-- Longitude verticals -->
  <ellipse cx="100" cy="95" rx="38" ry="78" fill="none" stroke="#1A5276" stroke-width="3"/>
  <ellipse cx="100" cy="95" rx="65" ry="78" fill="none" stroke="#1A5276" stroke-width="3"/>
  <line x1="100" y1="17" x2="100" y2="173" stroke="#1A5276" stroke-width="3"/>
  <!-- Latitude horizontals -->
  <line x1="22" y1="95" x2="178" y2="95" stroke="#1A5276" stroke-width="3"/>
  <path d="M28 57 Q100 72 172 57" fill="none" stroke="#1A5276" stroke-width="2.5"/>
  <path d="M28 133 Q100 118 172 133" fill="none" stroke="#1A5276" stroke-width="2.5"/>
  <path d="M40 30 Q100 42 160 30" fill="none" stroke="#1A5276" stroke-width="2"/>
  <path d="M40 160 Q100 148 160 160" fill="none" stroke="#1A5276" stroke-width="2"/>
  <!-- ISO text — large, bold, overlaid in same blue -->
  <text x="100" y="122" text-anchor="middle" font-size="82" fill="#1A5276" font-weight="900"
        font-family="Arial Black,Arial,Helvetica,sans-serif">ISO</text>
  <!-- 27001 below globe -->
  <text x="100" y="205" text-anchor="middle" font-size="50" fill="#1A5276" font-weight="900"
        font-family="Arial Black,Arial,Helvetica,sans-serif">27001</text>
</svg>